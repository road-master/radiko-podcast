services:
  radiko-podcast:
    build:
      context: .
    image: mstmelody/radiko-podcast:development
    volumes:
      - ./config.yml:/workspace/config.yml
      - ./output:/workspace/output
      # - Using uv in Docker | uv
      #   https://docs.astral.sh/uv/guides/integration/docker/#caching
      - uv-cache:/root/.cache/uv
volumes:
  uv-cache:
